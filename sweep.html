<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mountain × range sweep</title>
    <style>
      body {
        margin: 0;
        padding: 12px 16px;
        background: #111;
        color: #ddd;
        font: 13px system-ui, sans-serif;
      }
      #bar {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }
      #axes {
        color: #9bd;
        font: 12px ui-monospace, monospace;
        margin-bottom: 12px;
      }
      input,
      button {
        background: #222;
        color: #ddd;
        border: 1px solid #444;
        padding: 5px 8px;
        border-radius: 4px;
        font: inherit;
      }
      button {
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.4;
        cursor: default;
      }
      #status {
        color: #8c8;
        font: 12px ui-monospace, monospace;
      }
      #grid {
        display: grid;
        gap: 10px;
        align-items: start;
      }
      figure {
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }
      figure canvas {
        width: 100%;
        height: auto;
        aspect-ratio: 1;
        background: #000;
        border-radius: 6px;
      }
      figcaption {
        font: 11px ui-monospace, monospace;
        color: #ccc;
      }
    </style>
  </head>
  <body>
    <div id="bar">
      <strong>Mountain × Mountain Range — flat base</strong>
      <label>seed <input id="seed" /></label>
      <button id="regen">🎲 new seed</button>
      <button id="download">⬇ download all PNGs</button>
      <button id="sheet">⬇ contact sheet</button>
      <span id="status"></span>
    </div>
    <div id="axes"></div>
    <div id="grid"></div>
    <script type="module" src="/src/sweep.ts"></script>
  </body>
</html>
