<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mapinator</title>
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/style.css" />
</head>

<body>
  <div id="mobileWarning" class="hidden">
    <h2>⚠️ not supported</h2>
    <p>
      one day i'll get around to formatting this for small screens, but for now please use a big one.
    </p>
  </div>

  <div class="popup-backdrop" id="popupBackdrop" class="hidden">
    <div class="popup">
      <h3>download as...</h3>
      <button id="downloadPNGBtn" class="downloadPopupBtn">png</button>
      <button id="downloadSaveBtn" class="downloadPopupBtn">savefile</button>
      <br>
      <button id="cancelPopupBtn" class="downloadPopupBtn">cancel</button>
    </div>
  </div>

  <!-- Dev-only confirmation for "save to settings.ts" (wired in MenuBar.ts). -->
  <div class="popup-backdrop" id="saveSettingsPopup">
    <div class="popup">
      <h3>overwrite settings.ts?</h3>
      <p class="popup-body">
        write the current dial values into <code>src/common/settings.ts</code>, replacing the saved
        defaults. there's no undo (use git to revert).
      </p>
      <button id="confirmSaveSettingsBtn" class="downloadPopupBtn">save &amp; overwrite</button>
      <button id="cancelSaveSettingsBtn" class="downloadPopupBtn">cancel</button>
    </div>
  </div>

  <div class="left-sidebar">
    <!-- 1. title (full width; check floats at the right) -->
    <div id="titleContainer">
      <input type="text" id="mapTitle" spellcheck="false" />
      <button id="loadTitleBtn" class="img-button-container-small">
        <img id="loadTitleBtnImg" class="button-img-small" src="./assets/check.png"></img>
      </button>
    </div>

    <!-- 2. controls + collapsible sections. Reset + zoom stay visible; theme and the
         generation-dial groups (appended by AdvancedSettings.ts) are collapsible sections,
         collapsed by default. No outer box / label — the sidebar is the container. -->
    <div class="settings-section">
      <div class="controls-row">
        <!-- Dev-only: overwrite settings.ts with the live dial values. Hidden (.dev-only) until
             MenuBar.ts reveals it on the local dev server. Inert in production (no save endpoint). -->
        <button id="saveSettingsBtn" class="dev-only"
          title="overwrite src/common/settings.ts with the current dial values (dev only)">save to
          settings.ts</button>
        <button id="resetSlidersBtn">reset</button>
      </div>

      <!-- collapsible sections: Layers (open) is prepended by JS, then this theme group, then the
           dial groups appended after by JS -->
      <div id="advancedPanel" class="advanced-panel">
        <details class="adv-group">
          <summary><span class="adv-title">theme</span></summary>
          <div id="themeRadioList" class="adv-fields">
            <label><input type="radio" class="theme-radio" name="theme" value="lush" checked> lush</label>
            <label><input type="radio" class="theme-radio" name="theme" value="grayscale"> grayscale</label>
            <label><input type="radio" class="theme-radio" name="theme" value="rainbow"> rainbow</label>
          </div>
        </details>
      </div>
    </div>

    <!-- 3. upload / download + regen (right-aligned) -->
    <div id="ioButtons">
      <button id="downloadBtn" class="img-button-container">
        <img class="button-img" src="./assets/download.png"></img>
      </button>
      <button id="uploadBtn" class="img-button-container">
        <img class="button-img" src="./assets/upload.png"></img>
      </button>
      <button id="regenBtn" class="img-button-container">
        <img id="regenBtnImg" class="button-img" src="./assets/regen.png"></img>
      </button>
    </div>
  </div>


  <div id="mapContainer">
    <div id="mapFrame">
      <canvas id="map" width="1000" height="1000"></canvas>
      <!-- Plate-motion arrows: a transparent 2D canvas layered over the (WebGL) map canvas,
           drawn in main.ts when "tectonic plates" is on. Pointer-through, so orbit drags hit #map.
           Like the compass, it's a separate canvas so it never lands in the PNG export. -->
      <canvas id="plateArrows" width="1000" height="1000"></canvas>
      <!-- Feature name labels (seas, continents, …): another transparent 2D overlay over the map,
           drawn in main.ts when "geographic labels" is on. Pointer-through, and a separate canvas so it
           never lands in the PNG export. -->
      <canvas id="featureLabels" width="1000" height="1000"></canvas>
      <!-- Country borders + names: a transparent 2D overlay over the map, drawn in main.ts when the
           "countries" layer is on. Pointer-through, and a separate canvas so it never lands in the
           PNG export. -->
      <canvas id="countries" width="1000" height="1000"></canvas>
      <!-- Map overlay: re-orient north. A DOM element over the canvas, so it never
           appears in the PNG export (which composites only the canvas bitmap). -->
      <button id="northBtn" class="map-overlay-btn img-button-container" title="point north">
        <!-- Real 3D compass needle (Zdog), spun each frame in main.ts to point at north. Its
             own canvas, separate from the map, so it never lands in the PNG export. -->
        <canvas id="northCompass" width="35" height="35"></canvas>
      </button>
    </div>
  </div>

  <!-- Toggle the tools sidebar (glyph set in main.ts: "<" collapse, ">" open). -->
  <button id="toolsToggle" title="toggle tools" aria-label="toggle tools">&lt;</button>


  <script type="module" src="./src/main.ts"></script>
  <script type="module" src="./src/mobile-check.ts"></script>
</body>

</html>
